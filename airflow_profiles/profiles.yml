# Used only by dbt when it runs INSIDE the Airflow container. The host
# is "postgres" (the docker-compose service name) rather than 127.0.0.1,
# since containers reach each other by service name on Docker's internal
# network, not via the host machine's loopback address.
#
# This is separate from dbt/profiles.yml.sample (which you copy to
# ~/.dbt/profiles.yml for running dbt directly on your host machine).
# Both point at the same database -- just via a different hostname,
# depending on whether dbt is running inside Docker or outside it.

healthcare_dbt:
  target: dev
  outputs:
    dev:
      type: postgres
      host: postgres
      port: 5432
      user: healthcare
      password: healthcare
      dbname: healthcare_db
      schema: public
      threads: 4
