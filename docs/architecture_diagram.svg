<svg viewBox="0 0 1300 900" xmlns="http://www.w3.org/2000/svg" font-family="Helvetica, Arial, sans-serif">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#4a5568"/>
    </marker>
  </defs>

  <rect width="1300" height="900" fill="#0f172a"/>

  <text x="650" y="40" text-anchor="middle" fill="#f1f5f9" font-size="24" font-weight="bold">Healthcare Data Pipeline — Architecture</text>
  <text x="650" y="62" text-anchor="middle" fill="#94a3b8" font-size="13">7 layers, all running locally in Docker — no cloud account required</text>

  <!-- Airflow orchestration bar -->
  <rect x="40" y="90" width="1220" height="50" rx="6" fill="#1e293b" stroke="#f59e0b" stroke-width="2"/>
  <text x="650" y="120" text-anchor="middle" fill="#fcd34d" font-size="15" font-weight="bold">Airflow — orchestrates generate → load → dbt run → dbt test → validate (scheduled, retried, monitored)</text>

  <!-- Synthetic Data Gen -->
  <rect x="40" y="180" width="220" height="70" rx="6" fill="#1e293b" stroke="#38bdf8" stroke-width="2"/>
  <text x="150" y="210" text-anchor="middle" fill="#e2e8f0" font-size="14" font-weight="bold">Synthetic Data Generator</text>
  <text x="150" y="230" text-anchor="middle" fill="#94a3b8" font-size="11">Faker, seeded, 12 CSVs</text>

  <!-- Arrow gen -> minio -->
  <line x1="150" y1="250" x2="150" y2="300" stroke="#4a5568" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- MinIO -->
  <rect x="40" y="300" width="220" height="100" rx="6" fill="#1e293b" stroke="#a78bfa" stroke-width="2"/>
  <text x="150" y="328" text-anchor="middle" fill="#e2e8f0" font-size="14" font-weight="bold">MinIO</text>
  <text x="150" y="346" text-anchor="middle" fill="#94a3b8" font-size="11">S3-compatible object store</text>
  <text x="150" y="362" text-anchor="middle" fill="#94a3b8" font-size="10">raw/*.csv</text>
  <text x="150" y="376" text-anchor="middle" fill="#94a3b8" font-size="10">processed/*.parquet</text>

  <!-- Arrow minio -> postgres raw (down) -->
  <line x1="150" y1="400" x2="150" y2="450" stroke="#4a5568" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- Spark -->
  <rect x="330" y="300" width="220" height="100" rx="6" fill="#1e293b" stroke="#fb923c" stroke-width="2"/>
  <text x="440" y="328" text-anchor="middle" fill="#e2e8f0" font-size="14" font-weight="bold">PySpark</text>
  <text x="440" y="346" text-anchor="middle" fill="#94a3b8" font-size="11">reads CSVs, joins, aggregates</text>
  <text x="440" y="362" text-anchor="middle" fill="#94a3b8" font-size="10">writes partitioned Parquet back</text>
  <text x="440" y="376" text-anchor="middle" fill="#94a3b8" font-size="10">writes summary via JDBC</text>

  <!-- Arrows minio <-> spark -->
  <line x1="260" y1="335" x2="330" y2="335" stroke="#4a5568" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="330" y1="360" x2="260" y2="360" stroke="#4a5568" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- Arrow spark -> postgres spark_analytics -->
  <path d="M 440 400 L 440 430 L 990 430 L 990 450" stroke="#4a5568" stroke-width="2" fill="none" marker-end="url(#arrow)"/>

  <!-- Kafka Producer -->
  <rect x="620" y="180" width="200" height="70" rx="6" fill="#1e293b" stroke="#34d399" stroke-width="2"/>
  <text x="720" y="210" text-anchor="middle" fill="#e2e8f0" font-size="14" font-weight="bold">Kafka Producer</text>
  <text x="720" y="230" text-anchor="middle" fill="#94a3b8" font-size="11">simulated patient events</text>

  <!-- Arrow producer -> topic -->
  <line x1="720" y1="250" x2="720" y2="300" stroke="#4a5568" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- Kafka topic -->
  <rect x="620" y="300" width="200" height="70" rx="6" fill="#1e293b" stroke="#34d399" stroke-width="2"/>
  <text x="720" y="328" text-anchor="middle" fill="#e2e8f0" font-size="14" font-weight="bold">Kafka Topic</text>
  <text x="720" y="346" text-anchor="middle" fill="#94a3b8" font-size="11">patient-events (3 partitions)</text>

  <!-- Arrow topic -> consumer -->
  <line x1="720" y1="370" x2="720" y2="420" stroke="#4a5568" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- Kafka Consumer -->
  <rect x="620" y="420" width="200" height="60" rx="6" fill="#1e293b" stroke="#34d399" stroke-width="2"/>
  <text x="720" y="446" text-anchor="middle" fill="#e2e8f0" font-size="14" font-weight="bold">Kafka Consumer</text>
  <text x="720" y="464" text-anchor="middle" fill="#94a3b8" font-size="11">writes to streaming schema</text>

  <!-- Arrow consumer -> postgres streaming -->
  <line x1="720" y1="480" x2="720" y2="510" stroke="#4a5568" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- Postgres container -->
  <rect x="40" y="450" width="1220" height="320" rx="8" fill="#0f2136" stroke="#38bdf8" stroke-width="2"/>
  <text x="60" y="478" fill="#7dd3fc" font-size="16" font-weight="bold">PostgreSQL</text>

  <!-- raw -->
  <rect x="60" y="500" width="170" height="60" rx="6" fill="#1e293b" stroke="#38bdf8" stroke-width="1.5"/>
  <text x="145" y="525" text-anchor="middle" fill="#e2e8f0" font-size="13" font-weight="bold">raw</text>
  <text x="145" y="542" text-anchor="middle" fill="#94a3b8" font-size="10">untouched, 1:1 mirror</text>

  <line x1="230" y1="530" x2="280" y2="530" stroke="#4a5568" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- staging -->
  <rect x="280" y="500" width="170" height="60" rx="6" fill="#1e293b" stroke="#38bdf8" stroke-width="1.5"/>
  <text x="365" y="525" text-anchor="middle" fill="#e2e8f0" font-size="13" font-weight="bold">staging</text>
  <text x="365" y="542" text-anchor="middle" fill="#94a3b8" font-size="10">typed, deduped</text>

  <line x1="450" y1="530" x2="500" y2="530" stroke="#4a5568" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- analytics -->
  <rect x="500" y="500" width="170" height="60" rx="6" fill="#1e293b" stroke="#38bdf8" stroke-width="1.5"/>
  <text x="585" y="525" text-anchor="middle" fill="#e2e8f0" font-size="13" font-weight="bold">analytics</text>
  <text x="585" y="542" text-anchor="middle" fill="#94a3b8" font-size="10">star schema</text>

  <!-- dbt overlay note -->
  <rect x="280" y="580" width="390" height="50" rx="6" fill="#1e293b" stroke="#f472b6" stroke-width="1.5" stroke-dasharray="4,3"/>
  <text x="475" y="601" text-anchor="middle" fill="#f9a8d4" font-size="12" font-weight="bold">dbt (alt. path)</text>
  <text x="475" y="617" text-anchor="middle" fill="#94a3b8" font-size="10">19 models, 60 tests, same staging/analytics tables, auto-generated lineage</text>
  <line x1="475" y1="580" x2="475" y2="560" stroke="#f472b6" stroke-width="1.5" stroke-dasharray="4,3"/>

  <!-- spark_analytics -->
  <rect x="900" y="500" width="180" height="60" rx="6" fill="#1e293b" stroke="#fb923c" stroke-width="1.5"/>
  <text x="990" y="525" text-anchor="middle" fill="#e2e8f0" font-size="13" font-weight="bold">spark_analytics</text>
  <text x="990" y="542" text-anchor="middle" fill="#94a3b8" font-size="10">monthly_hospital_summary</text>

  <!-- streaming -->
  <rect x="640" y="530" width="180" height="60" rx="6" fill="#1e293b" stroke="#34d399" stroke-width="1.5"/>
  <text x="730" y="555" text-anchor="middle" fill="#e2e8f0" font-size="13" font-weight="bold">streaming</text>
  <text x="730" y="572" text-anchor="middle" fill="#94a3b8" font-size="10">patient_events (JSONB)</text>

  <!-- Legend -->
  <text x="60" y="670" fill="#7dd3fc" font-size="13" font-weight="bold">Why substitutions, not the real cloud services:</text>
  <text x="60" y="694" fill="#94a3b8" font-size="11">• Postgres instead of Snowflake — same warehouse pattern, free and permanent vs. a 30-day trial</text>
  <text x="60" y="714" fill="#94a3b8" font-size="11">• MinIO instead of AWS S3 — identical boto3 API, no credit card / billing risk</text>
  <text x="60" y="734" fill="#94a3b8" font-size="11">• Local PySpark instead of Databricks — same DataFrame API, stays integrated with this repo</text>
  <text x="60" y="754" fill="#94a3b8" font-size="11">• Plain kafka-python consumer instead of Spark Structured Streaming — same core Kafka mechanics, avoids a second fragile JAR chain</text>

  <text x="60" y="800" fill="#7dd3fc" font-size="13" font-weight="bold">Everything runs with:</text>
  <text x="60" y="822" fill="#e2e8f0" font-size="12" font-family="monospace">docker compose up -d --build  &amp;&amp;  ./scripts/run_all_with_spark.sh  &amp;&amp;  ./scripts/run_kafka_demo.sh</text>

  <text x="1260" y="890" text-anchor="end" fill="#475569" font-size="10">docs/architecture_diagram.svg</text>
</svg>
