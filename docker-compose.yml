services:
  postgres:
    image: postgres:16
    container_name: healthcare_pg
    restart: unless-stopped
    environment:
      POSTGRES_USER: healthcare
      POSTGRES_PASSWORD: healthcare
      POSTGRES_DB: healthcare_db
    ports:
      - "5432:5432"
    volumes:
      - healthcare_pg_data:/var/lib/postgresql/data

  # Web UI for browsing tables/running queries, at http://localhost:8080
  # (server: postgres, user/pass/db as above)
  adminer:
    image: adminer
    container_name: healthcare_adminer
    restart: unless-stopped
    ports:
      - "8080:8080"
    depends_on:
      - postgres

  # ---------------------------------------------------------------------
  # Airflow — orchestrates the pipeline as a scheduled, monitored DAG.
  # "standalone" mode: single container, SQLite metadata DB.
  # Web UI at http://localhost:8083 once it's up.
  # ---------------------------------------------------------------------
  airflow:
    build:
      context: .
      dockerfile: Dockerfile.airflow
    container_name: healthcare_airflow
    restart: unless-stopped
    depends_on:
      - postgres
      - minio
    environment:
      AIRFLOW__CORE__LOAD_EXAMPLES: "false"
      AIRFLOW__CORE__DAGS_ARE_PAUSED_AT_CREATION: "false"
    ports:
      - "8083:8080"
    volumes:
      - ./dags:/opt/airflow/dags
      - ./sql:/opt/airflow/sql
      - ./dbt:/opt/airflow/dbt
      - ./data:/opt/airflow/data
      - ./airflow_profiles:/opt/airflow/airflow_profiles
      - ./load_synthetic_data.sql:/opt/airflow/load_synthetic_data.sql
      - airflow_home:/opt/airflow
    command: standalone

  # ---------------------------------------------------------------------
  # MinIO — S3-compatible object store, standing in for AWS S3.
  # Console UI at http://localhost:9001, S3 API at http://localhost:9000
  # ---------------------------------------------------------------------
  minio:
    image: minio/minio
    container_name: healthcare_minio
    restart: unless-stopped
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data
    command: server /data --console-address ":9001"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 5s
      timeout: 5s
      retries: 5

  # One-shot: creates the "healthcare-raw-files" bucket, then exits.
  minio-init:
    image: minio/mc
    container_name: healthcare_minio_init
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      mc alias set local http://minio:9000 minioadmin minioadmin &&
      mc mb -p local/healthcare-raw-files &&
      echo 'Bucket ready.'
      "

  # ---------------------------------------------------------------------
  # Spark — PySpark jobs reading from MinIO (s3a://) and writing
  # partitioned Parquet back to MinIO + a summary table into Postgres
  # via JDBC. This is a batch-job image, not a long-running service --
  # it's meant to be run with `docker compose run --rm spark ...`
  # (see scripts/run_spark_job.sh), not left running via `up`.
  #
  # NOTE: first build downloads ~250MB of JARs (hadoop-aws, aws SDK,
  # postgres JDBC driver) and can take several minutes.
  # Spark UI (visible while a job is running) at http://localhost:4040
  # ---------------------------------------------------------------------
  spark:
    build:
      context: .
      dockerfile: Dockerfile.spark
    container_name: healthcare_spark
    restart: "no"
    depends_on:
      - postgres
      - minio
    volumes:
      - ./spark_jobs:/opt/spark_jobs
    ports:
      - "4040:4040"

volumes:
  healthcare_pg_data:
  airflow_home:
  minio_data:
